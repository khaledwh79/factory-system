<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — نظام إدارة المصنع</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0c29;
    background: radial-gradient(ellipse at top right, #1a1a4e 0%, #0f0c29 40%, #130a2e 100%);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 80%, rgba(120,40,200,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(40,100,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    animation: cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(.96); }
    to   { opacity: 1; transform: none; }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(102,126,234,0.4);
  }

  .logo h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
  }

  .logo p {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-top: 4px;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 13px 16px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    transition: border-color .2s, background .2s;
    outline: none;
  }

  input:focus {
    border-color: #667eea;
    background: rgba(102,126,234,0.1);
  }

  input::placeholder { color: rgba(255,255,255,0.25); }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  }

  .btn:hover  { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .err {
    background: rgba(255,70,70,0.15);
    border: 1px solid rgba(255,70,70,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: #ff8080;
    font-size: 14px;
    text-align: center;
    margin-top: 16px;
    display: none;
    animation: shake .4s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }

  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-left: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🏭</div>
    <h1>نظام إدارة المصنع</h1>
    <p>قم بتسجيل الدخول للمتابعة</p>
  </div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="uname" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="upass" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit" id="loginBtn">تسجيل الدخول</button>
    <div class="err" id="errMsg"></div>
  </form>
</div>

<script>
  const API = "";

  // Redirect if already logged in
  if (localStorage.getItem("token")) {
    window.location.href = "/dashboard";
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const err = document.getElementById("errMsg");
    err.style.display = "none";
    btn.disabled = true;
    btn.innerHTML = 'جاري التحقق <span class="spinner"></span>';

    try {
      const res = await fetch(API + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("uname").value.trim(),
          password: document.getElementById("upass").value
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "خطأ في تسجيل الدخول");
      }

      localStorage.setItem("token", data.access_token);
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "/dashboard";

    } catch (ex) {
      err.textContent = ex.message;
      err.style.display = "block";
      btn.disabled = false;
      btn.innerHTML = "تسجيل الدخول";
    }
  }
</script>
</body>
</html>
